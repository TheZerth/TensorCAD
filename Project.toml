name = "Tensorsmith"
uuid = "76de2e0b-704b-43d8-99b4-e1f809ecc2c8"
authors = ["Kainaan Riordan <drkainaan@gmail.com>"]
version = "0.1.0"

[deps]
# Phase 0-4: zero non-stdlib dependencies.

[weakdeps]
# Phase 5: Symbolics.jl is a weak dependency.
# The extension activates automatically when the user does:
#   using Tensorsmith, Symbolics
# It has zero impact on users who never load Symbolics.
Symbolics = "0c5d862f-8b57-4792-8d23-62f2024744c7"

[extensions]
TensorsmithSymbolicsExt = "Symbolics"

[compat]
julia = "1.9"
Symbolics = "5"

[extras]
Test = "8dfed614-e22c-358a-6103-e272d43a2c93"
Symbolics = "0c5d862f-8b57-4792-8d23-62f2024744c7"

[targets]
test = ["Test", "Symbolics"]
